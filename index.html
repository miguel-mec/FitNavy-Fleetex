body{font-family:Arial,sans-serif;margin:0;background:#f3f6fa;color:#111}
header{background:#071a2f;color:white;padding:20px}
h1{margin:0;font-size:28px}
main{max-width:950px;margin:auto;padding:18px}
button{background:#0f3b66;color:white;border:0;border-radius:10px;padding:10px 14px;font-weight:bold;margin:4px;cursor:pointer}
button.active{background:#d4a017;color:#111}
input{width:100%;padding:13px;border-radius:10px;border:1px solid #bbb;font-size:16px;margin:12px 0}
.card{background:white;border-radius:14px;padding:14px;margin:10px 0;box-shadow:0 3px 12px #0002;border-left:6px solid #0f3b66;cursor:pointer}
.card h3{margin:0}
.hidden{display:none}
.detail{background:white;border-radius:14px;padding:18px;box-shadow:0 3px 12px #0002}
.pill{background:#e8eef7;color:#0f3b66;padding:5px 9px;border-radius:999px;font-weight:bold;display:inline-block;margin:3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.panel{background:#f7f7f7;border-radius:12px;padding:12px}
.timerBox{position:fixed;left:16px;right:16px;bottom:16px;background:#071a2f;color:white;border-radius:18px;padding:16px;text-align:center;box-shadow:0 5px 24px #0007}
.timer{font-size:48px;font-weight:bold}
@media(max-width:650px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>NAVYFIT EMBARCADO</h1>
<p>FLEETEX Edition · versión simple sin caché</p>
</header>

<main>
<section id="list">
<input id="search" placeholder="Buscar entrenamiento..." oninput="render()">
<div>
<button id="bALL" class="active" onclick="setFilter('ALL')">Todos</button>
<button id="bGYMONLY" onclick="setFilter('GYM ONLY')">Gym Only</button>
<button id="bFLIGHTDECKOPS" onclick="setFilter('FLIGHT DECK OPS')">Flight Deck Ops</button>
<button id="bOLYMPIC" onclick="setFilter('OLYMPIC TACTICAL')">Olympic Tactical</button>
</div>
<div>
<button onclick="recommend('rough')">🔴 Mala mar</button>
<button onclick="recommend('moderate')">🟡 Mar moderada</button>
<button onclick="recommend('calm')">🟢 Mar calma</button>
</div>
<div id="workouts"></div>
</section>

<section id="detail" class="hidden">
<div id="detailContent" class="detail"></div>
</section>
</main>

<div id="timerBox" class="timerBox hidden">
<div id="timerTitle">Timer</div>
<div id="timer" class="timer">0:00</div>
<button onclick="pauseTimer()">Pausa/seguir</button>
<button onclick="stopTimer()">Cerrar</button>

    "rx": "Push Press 40 kg. Power Clean 50 kg. Med Ball 9 kg.",
    "scaled": "Run 250 m. Push Press 30 kg. Power Clean 35 kg. 20-15-10 reps.",
    "sea": "Run por 500 m Row. Burpees por Push Ups."
  }
];
let filter = 'ALL';
let timer = null;
let remaining = 0;

function setFilter(f){
  filter = f;
  document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  const map = {'ALL':'bALL','GYM ONLY':'bGYMONLY','FLIGHT DECK OPS':'bFLIGHTDECKOPS','OLYMPIC TACTICAL':'bOLYMPIC'};
  if(document.getElementById(map[f])) document.getElementById(map[f]).classList.add('active');
  render();
}

function render(){
  const box = document.getElementById('workouts');
  const q = document.getElementById('search').value.toLowerCase();
  box.innerHTML = '';
  const arr = WORKOUTS.filter(w => (filter==='ALL' || w.block===filter) && 
    (w.name.toLowerCase().includes(q) || w.focus.toLowerCase().includes(q) || w.block.toLowerCase().includes(q)));
  if(arr.length===0) box.innerHTML = '<p>No hay resultados.</p>';
  arr.forEach(w=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<h3>${String(w.id).padStart(2,'0')} – ${w.name}</h3><p><b>${w.block}</b> · ${w.focus}</p><p>${w.intensity} · ${w.duration}</p>`;
    div.onclick=()=>openWorkout(w.id);
    box.appendChild(div);
  });
}

function openWorkout(id){
  const w = WORKOUTS.find(x=>x.id===id);
  document.getElementById('list').classList.add('hidden');
  document.getElementById('detail').classList.remove('hidden');
  document.getElementById('detailContent').innerHTML = `
    <button onclick="back()">← Volver</button>
    <h1>${String(w.id).padStart(2,'0')} – ${w.name}</h1>
    <p><span class="pill">${w.block}</span><span class="pill">${w.duration}</span><span class="pill">${w.intensity}</span></p>
    <p><b>Foco:</b> ${w.focus}</p>
    <p><b>Material:</b> ${w.material}</p>
    <p><b>Objetivo:</b> ${w.objective}</p>
    <h2>Calentamiento</h2><ul>${w.warmup.map(x=>`<li>${x}</li>`).join('')}</ul>
    <h2>Fuerza / Técnica</h2><p>${w.strength}</p>
    <h2>Accesorio</h2><p>${w.accessory}</p>
    <h2>WOD</h2><p>${w.wod}</p>
    <div class="grid"><div class="panel"><h2>RX</h2><p>${w.rx}</p></div><div class="panel"><h2>Scaled</h2><p>${w.scaled}</p></div></div>
    <h2>Sea State &gt; 3</h2><p>${w.sea}</p>
    <button onclick="startTimer(12*60,'Warm Up')">Warm Up 12'</button>
    <button onclick="startTimer(18*60,'WOD 18')">WOD 18'</button>
    <button onclick="startTimer(20*60,'WOD 20')">WOD 20'</button>
  `;
}

function back(){
  document.getElementById('detail').classList.add('hidden');
  document.getElementById('list').classList.remove('hidden');
}

function recommend(state){
  let pool = WORKOUTS;
  if(state==='rough') pool = WORKOUTS.filter(w=>w.block==='GYM ONLY');
  if(state==='moderate') pool = WORKOUTS.filter(w=>w.block!=='FLIGHT DECK OPS');
  if(state==='calm') pool = WORKOUTS;
  const w = pool[Math.floor(Math.random()*pool.length)];
  openWorkout(w.id);
}

function startTimer(sec,title){
  remaining=sec;
  document.getElementById('timerTitle').textContent=title;
  document.getElementById('timerBox').classList.remove('hidden');
  updateTimer();
  if(timer) clearInterval(timer);
  timer=setInterval(()=>{remaining--; updateTimer(); if(remaining<=0){clearInterval(timer); timer=null;}},1000);
}
function pauseTimer(){
  if(timer){clearInterval(timer); timer=null;}
  else timer=setInterval(()=>{remaining--; updateTimer(); if(remaining<=0){clearInterval(timer); timer=null;}},1000);
}
function stopTimer(){
  if(timer) clearInterval(timer);
  timer=null;
  document.getElementById('timerBox').classList.add('hidden');
}
function updateTimer(){
  let m=Math.floor(remaining/60), s=remaining%60;
  document.getElementById('timer').textContent=m+':'+String(s).padStart(2,'0');
}

render();
</script>
</body>
</html>
